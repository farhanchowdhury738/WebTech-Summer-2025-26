<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add To Cart</title>
</head>
<body>

    <fieldset>
        <legend>Product Info</legend>

        <table>
        <tr>
            <td>Product Name</td>
            <td>
                <input type="text" value="Asus vivobook" readonly>
            </td>
        </tr>
        <tr>
            <td>Unit Price</td>
            <td>
                <input type="text" id="price" value="500" readonly>
            </td>
        </tr>

        <tr>
            <td>Quantity</td>
            <td>
                <input type="number" id="quantity" onkeyup=" return calculate()">
            </td>
            <td>
                <p id="err" style="color:red;"></p>
            </td>
        </tr>

        <tr>
            <td>Payable</td>
            <td>
                <input type="text" id="payable" readonly>
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <button id="button" style="display:none;">
                    Add To Cart
                </button>
            </td>
        </tr>

    </table>
    </fieldset>

    <script src="app.js"></script>

</body>
</html>
