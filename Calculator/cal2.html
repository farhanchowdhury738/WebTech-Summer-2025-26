<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#111;
}

.calculator{
    width:340px;
    background:#222;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.5);
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    background:#333;
    color:white;
    font-size:35px;
    text-align:right;
    padding:10px;
    border-radius:10px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:50%;
    font-size:22px;
    cursor:pointer;
    background:#444;
    color:white;
    transition:.2s;
}

button:hover{
    background:#555;
}

.operator{
    background:orange;
}

.equal{
    background:orange;
}

.zero{
    grid-column:span 2;
    border-radius:35px;
}
</style>

</head>
<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button onclick="clr()">AC</button>
        <button onclick="del()">DEL</button>
        <button onclick="add('%')">%</button>
        <button class="operator" onclick="add('/')">/</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="operator" onclick="add('*')">*</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="operator" onclick="add('-')">-</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="operator" onclick="add('+')">+</button>

        <button class="zero" onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button class="equal" onclick="equal()">=</button>

    </div>

</div>

<script>

let display = document.getElementById("display");

function add(value){
    display.value = display.value + value;
}

function clr(){
    display.value = "";
}

function del(){
    display.value = display.value.substring(0, display.value.length - 1);
}

function equal(){

    if(display.value == ""){
        alert("Please enter a number");
    }
    else{
        display.value = eval(display.value);
    }

}

</script>

</body>
</html>
